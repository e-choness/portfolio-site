<!-- Back to Top Button -->
<button class="back-to-top" id="backToTop" aria-label="Back to top">
  <i class="fas fa-arrow-up"></i>
</button>

<!-- JavaScript Libraries -->
<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
></script>
<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"
></script>
{% if page.layout == 'post' %}
<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"
></script>
<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"
></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Kramdown renders ```mermaid as <pre><code class="language-mermaid">
  // Transform to <pre class="mermaid"> so Mermaid.js picks it up
  document.querySelectorAll('pre code.language-mermaid').forEach(function (el) {
    var pre = el.parentElement;
    var container = document.createElement('pre');
    container.className = 'mermaid';
    container.textContent = el.textContent;
    pre.parentElement.replaceChild(container, pre);
  });
  mermaid.initialize({ startOnLoad: true });
</script>
<script>
  // Kramdown renders ```markmap as <pre><code class="language-markmap">
  // Transform to <div class="markmap"> so markmap-autoloader picks it up
  document.querySelectorAll('pre code.language-markmap').forEach(function (el) {
    var pre = el.parentElement;
    var container = document.createElement('div');
    container.className = 'markmap';
    container.textContent = el.textContent;
    pre.parentElement.replaceChild(container, pre);
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.16"></script>
{% endif %}

<!-- Typed.js Data -->
<script type="application/json" id="typed-strings">
  {{ site.data.profile.typed_strings | jsonify }}
</script>
<script>
  (function () {
    try {
      var el = document.getElementById("typed-strings");
      window.typedStrings = el ? JSON.parse(el.textContent) : [];
    } catch (e) {
      window.typedStrings = [];
    }
  })();
</script>

<!-- Custom JavaScript -->
<script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
